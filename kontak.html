<!DOCTYPE html>
<html>

<head>
    <title>Kontak - ROPS Store</title>

    <style>
        body{
            margin: 0;
            background-image: url("kons.avif");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container{
            width: 60%;
            margin: auto;
            background: #e0e0e0;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            margin-top: 50px;
            text-align: center;
        }

        h1{
            margin-bottom: 5px;
        }

        p{
            margin-top: 0;
            color: #333;
        }

        .form-group{
            text-align: left;
            margin-top: 15px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #aaa;
            font-family: Georgia;
        }

        textarea{
            height: 120px;
            resize: none;
        }

        .btn{
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .btn:hover{
            background: gray;
        }

        .info{
            margin-top: 25px;
            font-size: 14px;
            color: #333;
        }

        a{
            text-decoration: none;
            color: blue;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Kontak ROPS STORE</h1>
    <p>Silakan hubungi kami jika ada pertanyaan atau kerja sama</p>

    <form>

        <div class="form-group">
            <label>Nama</label>
            <input type="text" placeholder="Masukkan nama kamu">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Masukkan email kamu">
        </div>

        <div class="form-group">
            <label>Pesan</label>
            <textarea placeholder="Tulis pesan kamu di sini"></textarea>
        </div>

        <button class="btn" type="submit">Kirim Pesan</button>

    </form>

    <div class="info">
        <p><b>Alamat:</b> Indonesia, Jawa Barat</p>
        <p><b>Email:</b> ropsstore@gmail.com</p>
        <p><b>Instagram:</b> @ropsstore</p>
        <br>
        <a href="index.html">⬅ Kembali ke Home</a>
    </div>

</div>

</body>

</html>
